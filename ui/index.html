<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPL AI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #080c14;
      --bg-card: #0f1623;
      --bg-elevated: #161f30;
      --bg-pitch: #1a472a;
      --border: #1e2d45;
      --border-bright: #2a3f5f;
      --text: #ddeeff;
      --text-secondary: #6a88aa;
      --text-muted: #3a5070;
      --green: #00e676;
      --amber: #ffb300;
      --red: #ff1744;
      --purple: #7c3aed;
      --chip-tc: #ffd700;
      --chip-bb: #9c27b0;
      --chip-wc: #00c853;
      --chip-fh: #00bcd4;
      --pos-gk: #e6b800;
      --pos-def: #1565c0;
      --pos-mid: #2e7d32;
      --pos-fwd: #b71c1c;
      --header-h: 60px;
      --transition: 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h); z-index: 100;
      background: rgba(8,12,20,0.96);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 20px; gap: 12px;
    }

    #brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px; font-weight: 700;
      letter-spacing: 3px; color: var(--green);
      white-space: nowrap; cursor: pointer;
      flex-shrink: 0;
    }

    #stats-strip { display: flex; gap: 24px; align-items: center; flex-shrink: 0; }

    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      color: var(--text-muted); letter-spacing: 1px;
    }
    .stat-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px; font-weight: 600; color: var(--text);
    }
    .stat-value.negative { color: var(--red); }

    #chips-used { display: flex; gap: 4px; align-items: center; }

    .chip-badge {
      padding: 3px 7px; border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700; line-height: 1;
    }
    .chip-badge.chip-tc { background: var(--chip-tc); color: #000; }
    .chip-badge.chip-bb { background: var(--chip-bb); color: #fff; }
    .chip-badge.chip-wc { background: var(--chip-wc); color: #000; }
    .chip-badge.chip-fh { background: var(--chip-fh); color: #000; }

    /* ── RUN BUTTON ── */
    #run-btn {
      padding: 9px 18px; border-radius: 22px;
      background: var(--green); color: #000;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 1px;
      border: none; cursor: pointer;
      display: flex; align-items: center; gap: 7px;
      white-space: nowrap; transition: background 0.2s;
      flex-shrink: 0;
    }
    #run-btn:hover:not(.running) { background: #33eb91; }
    #run-btn.running {
      background: var(--border); color: var(--text-secondary); cursor: not-allowed;
    }
    #run-btn.running::before {
      content: ''; display: inline-block;
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid transparent; border-top-color: var(--green);
      animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CAROUSEL ── */
    #carousel-wrapper {
      position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    #carousel-track {
      display: flex; width: 100%; height: 100%;
      transition: transform var(--transition);
    }
    #carousel-track.no-transition { transition: none; }

    .gw-page {
      min-width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 40px 72px; overflow-y: auto;
    }

    /* ── NAV ARROWS ── */
    .nav-arrow {
      position: fixed; top: 50%; transform: translateY(-50%);
      z-index: 50; width: 44px; height: 44px; border-radius: 50%;
      background: var(--bg-elevated); border: 1px solid var(--border);
      color: var(--text); font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .nav-arrow:hover:not(:disabled) { border-color: var(--border-bright); background: var(--bg-card); }
    .nav-arrow:disabled { opacity: 0.2; cursor: default; }
    #nav-prev { left: 10px; }
    #nav-next { right: 10px; }

    /* ── GW INDICATOR + DOTS ── */
    #gw-indicator {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      z-index: 50; background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap;
    }
    #gw-dots {
      position: fixed; bottom: 44px; left: 50%; transform: translateX(-50%);
      z-index: 50; display: flex; gap: 4px; flex-wrap: wrap;
      max-width: 640px; justify-content: center;
    }
    .gw-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--border); cursor: pointer;
      transition: background 0.2s, transform 0.2s; flex-shrink: 0;
    }
    .gw-dot.active { background: var(--green); transform: scale(1.4); }
    .gw-dot.overview { background: #7c3aed; }
    .gw-dot.overview.active { background: #a855f7; }
    .gw-dot:hover { background: var(--border-bright); }

    /* ── GW HEADER ── */
    .gw-header {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 860px; margin-bottom: 6px;
    }
    .gw-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 30px; font-weight: 700; color: var(--text);
    }
    .chip-badge-large {
      padding: 8px 16px; border-radius: 6px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 1px;
    }
    .gw-score { display: flex; align-items: baseline; gap: 4px; }
    .gw-actual {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px; font-weight: 700;
    }
    .gw-actual.positive { color: var(--green); }
    .gw-actual.negative { color: var(--red); }
    .gw-predicted {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px; color: var(--text-secondary);
    }

    /* ── GW META BAR ── */
    .gw-meta-bar {
      display: flex; gap: 20px; align-items: center;
      width: 100%; max-width: 860px;
      margin-bottom: 8px; flex-wrap: wrap;
    }
    .meta-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--text-secondary);
    }
    .meta-icon { font-size: 13px; }
    .meta-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 600; color: var(--text);
    }

    /* ── PITCH ── */
    .pitch-container {
      position: relative; max-width: 780px; width: 100%;
      background: var(--bg-pitch);
      background-image: repeating-linear-gradient(
        0deg, #1a472a, #1a472a 40px, #1c4e2e 40px, #1c4e2e 80px);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.06);
      padding: 14px 8px;
    }
    .pitch-lines {
      position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none;
    }
    .pitch-row {
      display: flex; justify-content: center; gap: 8px;
      margin: 7px 0; position: relative; z-index: 1;
    }

    /* ── PLAYER CARD ── */
    .player-card {
      width: 82px; display: flex; flex-direction: column;
      align-items: center; gap: 2px;
      background: rgba(0,0,0,0.6); border-radius: 8px;
      padding: 6px 4px 5px; border: 1px solid transparent;
      position: relative; cursor: default;
    }
    .player-card.border-green { border-color: var(--green); }
    .player-card.border-amber { border-color: var(--amber); }
    .player-card.border-red   { border-color: var(--red); }
    .player-card.subbed-out   { opacity: 0.45; border-color: var(--text-muted) !important; }

    /* Position badge */
    .pos-badge {
      position: absolute; top: -7px; left: -7px;
      padding: 2px 5px; border-radius: 3px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 9px; font-weight: 700; line-height: 1;
    }
    .pos-badge.pos-gk  { background: var(--pos-gk);  color: #000; }
    .pos-badge.pos-def { background: var(--pos-def);  color: #fff; }
    .pos-badge.pos-mid { background: var(--pos-mid);  color: #fff; }
    .pos-badge.pos-fwd { background: var(--pos-fwd);  color: #fff; }

    .player-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; font-weight: 600; text-align: center;
      word-break: break-word; line-height: 1.2;
      max-height: 2.4em; overflow: hidden; color: var(--text);
    }
    .player-pts {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px; font-weight: 700; color: #fff; line-height: 1;
    }
    .player-pts-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 600; color: var(--chip-tc); line-height: 1;
    }
    .player-meta {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
      justify-content: center;
    }
    .player-price {
      font-size: 9px; color: var(--amber);
      font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
    }
    .player-predicted {
      font-size: 9px; color: var(--text-muted);
      font-family: 'Inter', sans-serif;
    }

    /* Intel warning icons */
    .intel-flags {
      display: flex; gap: 3px; align-items: center; min-height: 12px;
    }
    .intel-icon {
      font-size: 9px; line-height: 1;
      padding: 1px 3px; border-radius: 3px;
    }
    .intel-icon.avail-warn { background: rgba(255,23,68,0.25); color: var(--red); }
    .intel-icon.rot-warn   { background: rgba(255,179,0,0.2);  color: var(--amber); }

    /* Captain / VC badge */
    .cap-badge {
      position: absolute; top: -7px; right: -7px;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--chip-tc); color: #000;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .cap-badge.vc { background: #888; color: #fff; }

    /* Sub-out badge */
    .sub-out-badge {
      position: absolute; top: -6px; left: 16px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--red); color: #fff;
      font-size: 9px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* Claude explanation bubble */
    .claude-bubble {
      position: absolute; bottom: -7px; left: 50%;
      transform: translateX(-50%);
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--purple); color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 8px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 10;
      border: 1px solid rgba(255,255,255,0.15);
      transition: background 0.15s, transform 0.15s;
    }
    .claude-bubble:hover {
      background: #9d5cf6; transform: translateX(-50%) scale(1.2);
    }

    /* ── BENCH ── */
    .bench-strip { max-width: 780px; width: 100%; margin-top: 9px; }
    .bench-label {
      font-size: 10px; text-transform: uppercase;
      color: var(--text-muted); letter-spacing: 1px; margin-bottom: 5px;
    }
    .bench-row { display: flex; gap: 8px; justify-content: center; }
    .bench-row .player-card { width: 72px; opacity: 0.78; }

    /* ── CAPTAIN PANEL ── */
    .captain-panel {
      max-width: 780px; width: 100%; margin-top: 10px;
      background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.3);
      border-radius: 8px; padding: 10px 14px;
    }
    .captain-panel-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      color: #a855f7; letter-spacing: 1px; margin-bottom: 5px;
    }
    .captain-panel-text {
      font-size: 12px; color: #d4c4ff; line-height: 1.55;
    }

    /* ── GW FOOTER (transfers) ── */
    .gw-footer {
      max-width: 780px; width: 100%; margin-top: 9px;
      display: flex; gap: 20px; flex-wrap: wrap;
      color: var(--text-secondary); font-size: 12px;
      align-items: center;
    }
    .footer-section { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .transfer-in  { color: var(--green); font-size: 13px; }
    .transfer-out { color: var(--red);   font-size: 13px; }
    .hit-line {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 700; color: var(--red);
    }

    /* ── CLAUDE TOOLTIP ── */
    .claude-tooltip {
      position: fixed; z-index: 200; max-width: 420px; width: 420px;
      background: #130e24;
      border: 1px solid rgba(124,58,237,0.5);
      border-radius: 10px; padding: 12px 14px;
      font-size: 12px; color: #e0d4ff; line-height: 1.6;
      box-shadow: 0 12px 32px rgba(0,0,0,0.7);
      pointer-events: none; opacity: 0;
      transition: opacity 0.15s;
    }
    .claude-tooltip.visible { opacity: 1; }
    .claude-tooltip-label {
      font-size: 10px; font-weight: 600; color: #a855f7;
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
    }

    /* ── SEASON OVERVIEW PAGE ── */
    .season-overview-page {
      gap: 18px; padding-top: 20px;
    }
    .overview-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px; font-weight: 700;
      color: var(--text); width: 100%; max-width: 900px;
      display: flex; align-items: center; gap: 12px;
    }
    .overview-title span.subtitle {
      font-size: 14px; font-weight: 400; color: var(--text-secondary);
    }
    .overview-stats-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 10px; width: 100%; max-width: 900px;
    }
    .overview-stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .overview-stat-label {
      font-size: 10px; text-transform: uppercase;
      color: var(--text-muted); letter-spacing: 1px; font-weight: 600;
    }
    .overview-stat-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px; font-weight: 700; color: var(--green);
    }
    .overview-stat-note {
      font-size: 11px; color: var(--text-secondary);
    }
    .chart-outer {
      width: 100%; max-width: 900px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
    }
    .chart-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px; font-weight: 600;
      color: var(--text-secondary); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .chart-outer canvas { max-height: 260px; }
    .chips-timeline {
      width: 100%; max-width: 900px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 18px;
    }
    .chips-timeline-title {
      font-size: 10px; text-transform: uppercase; color: var(--text-muted);
      letter-spacing: 1px; font-weight: 600; margin-bottom: 10px;
    }
    .chips-row {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .chip-event {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .chip-event-gw {
      font-size: 10px; color: var(--text-secondary);
    }
    .chip-event-pts {
      font-size: 11px; color: var(--text-muted);
    }

    /* ── ERROR STATE ── */
    #error-state {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 16px;
      color: var(--text-secondary); font-size: 16px;
      text-align: center; padding: 40px;
    }
    #error-state.visible { display: flex; }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="brand" onclick="goToGW(0)">FPL AI</div>

  <div id="stats-strip">
    <div class="stat-item">
      <span class="stat-label">PTS</span>
      <span class="stat-value" id="stat-pts">—</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">AVG</span>
      <span class="stat-value" id="stat-avg">—</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">HITS</span>
      <span class="stat-value" id="stat-hits">—</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">CHIPS</span>
      <div id="chips-used"></div>
    </div>
  </div>

  <button id="run-btn" onclick="runSimulation()">RUN SIMULATION</button>
</div>

<!-- NAV ARROWS -->
<button class="nav-arrow" id="nav-prev" onclick="goToGW(currentGW - 1)">&#8249;</button>
<button class="nav-arrow" id="nav-next" onclick="goToGW(currentGW + 1)">&#8250;</button>

<!-- CAROUSEL -->
<div id="carousel-wrapper">
  <div id="error-state">
    <div>No simulation data. Run the simulator to get started.</div>
  </div>
  <div id="carousel-track"></div>
</div>

<!-- GW DOTS -->
<div id="gw-dots"></div>

<!-- GW INDICATOR -->
<div id="gw-indicator">— / —</div>

<!-- CLAUDE TOOLTIP -->
<div class="claude-tooltip" id="claude-tooltip">
  <div class="claude-tooltip-label">Claude AI Analysis</div>
  <div id="claude-tooltip-text"></div>
</div>

<script>
  let data        = null;
  let explanations = {};   // gw -> { players: {name: text}, captain_note: text }
  let intelData   = {};    // gw_str -> { pid_str -> {avail_pct, rotation_risk} }
  let currentGW   = 0;     // 0 = overview page, 1..N = GW pages (index in allPages)
  let isRunning   = false;
  let pollInterval = null;
  let seasonChart = null;

  // allPages[0] = season overview, allPages[1..N] = GW pages
  let allPages = [];

  // ── INIT ────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', init);

  async function init() {
    const [dataRes, exRes, intelRes] = await Promise.all([
      fetch('/api/data'),
      fetch('/api/explanations').catch(() => null),
      fetch('/api/intel').catch(() => null),
    ]);

    if (!dataRes.ok) { showError(); return; }
    data = await dataRes.json();
    if (data.error) { showError(); return; }

    if (exRes && exRes.ok) {
      const exData = await exRes.json();
      (exData.gameweeks || []).forEach(g => {
        explanations[g.gw] = {
          players:      g.player_explanations || {},
          captain_note: g.captain_note || '',
        };
      });
    }

    if (intelRes && intelRes.ok) {
      intelData = await intelRes.json();
    }

    renderHeader();
    renderCarousel();
    updateNav();
    setInterval(checkStatus, 4000);
    document.addEventListener('click', hideTooltip);
  }

  function showError() {
    document.getElementById('error-state').classList.add('visible');
    document.getElementById('carousel-track').style.display = 'none';
    ['nav-prev','nav-next','gw-dots','gw-indicator'].forEach(id => {
      document.getElementById(id).style.display = 'none';
    });
  }

  // ── HEADER ──────────────────────────────────────────────────────────────
  function renderHeader() {
    document.getElementById('stat-pts').textContent = data.total_actual_pts;

    const gwCount = data.gameweeks.length;
    const avg = gwCount > 0 ? (data.total_actual_pts / gwCount).toFixed(1) : '—';
    document.getElementById('stat-avg').textContent = avg;

    const totalHits = data.gameweeks.reduce((s, g) => s + (g.penalty_pts || 0), 0);
    const hitsEl = document.getElementById('stat-hits');
    hitsEl.textContent = totalHits < 0 ? totalHits : '0';
    if (totalHits < 0) hitsEl.classList.add('negative');

    const chipsEl = document.getElementById('chips-used');
    chipsEl.innerHTML = '';
    if (data.chips_used && data.chips_used.length > 0) {
      data.chips_used.forEach(c => {
        const t = chipType(c.chip);
        const badge = document.createElement('span');
        badge.className = `chip-badge chip-${t.toLowerCase()}`;
        badge.textContent = t;
        chipsEl.appendChild(badge);
      });
    } else {
      chipsEl.textContent = '—';
    }
  }

  function chipType(s) {
    if (!s) return '';
    const l = s.toLowerCase();
    if (l.startsWith('tc')) return 'TC';
    if (l.startsWith('bb')) return 'BB';
    if (l.startsWith('wc')) return 'WC';
    if (l.startsWith('fh')) return 'FH';
    return s.toUpperCase();
  }
  function chipClass(s)  { return `chip-${chipType(s).toLowerCase()}`; }
  function chipLabel(s) {
    const l = (s||'').toLowerCase();
    if (l.startsWith('tc')) return 'TRIPLE CAPTAIN';
    if (l.startsWith('bb')) return 'BENCH BOOST';
    if (l.startsWith('wc')) return 'WILDCARD';
    if (l.startsWith('fh')) return 'FREE HIT';
    return s ? s.toUpperCase() : '';
  }

  // ── CAROUSEL ─────────────────────────────────────────────────────────────
  function renderCarousel() {
    const track = document.getElementById('carousel-track');
    track.innerHTML = '';
    allPages = [];

    // Page 0: Season overview
    const overviewPage = buildOverviewPage();
    track.appendChild(overviewPage);
    allPages.push('overview');

    // Pages 1..N: individual GWs
    data.gameweeks.forEach(gw => {
      track.appendChild(buildGWPage(gw));
      allPages.push(gw.gw);
    });

    // Dots
    const dotsEl = document.getElementById('gw-dots');
    dotsEl.innerHTML = '';
    allPages.forEach((label, i) => {
      const dot = document.createElement('div');
      dot.className = 'gw-dot' + (i === 0 ? ' overview' : '') + (i === currentGW ? ' active' : '');
      dot.title = label === 'overview' ? 'Season Overview' : `GW ${label}`;
      dot.addEventListener('click', () => goToGW(i));
      dotsEl.appendChild(dot);
    });

    goToGW(currentGW, false);
  }

  // ── SEASON OVERVIEW PAGE ─────────────────────────────────────────────────
  function buildOverviewPage() {
    const page = document.createElement('div');
    page.className = 'gw-page season-overview-page';

    // Title
    const title = document.createElement('div');
    title.className = 'overview-title';
    title.innerHTML = `2025/26 FPL AI Season <span class="subtitle">Hybrid LightGBM + ILP + Claude</span>`;
    page.appendChild(title);

    // Stats grid
    const gws = data.gameweeks;
    const pts = gws.map(g => g.actual_total ?? g.actual_pts ?? sumPtsCounted(g.xi));
    const totalPts = data.total_actual_pts;
    const avgPts  = gws.length ? (totalPts / gws.length).toFixed(1) : 0;
    const bestGW  = pts.reduce((best, p, i) => p > pts[best] ? i : best, 0);
    const worstGW = pts.reduce((worst, p, i) => p < pts[worst] ? i : worst, 0);
    const totalHits = gws.reduce((s, g) => s + (g.penalty_pts || 0), 0);
    const chipCount = (data.chips_used || []).length;

    const statsGrid = document.createElement('div');
    statsGrid.className = 'overview-stats-grid';

    const statItems = [
      { label: 'Total Points', value: totalPts, note: `${gws.length} gameweeks` },
      { label: 'Avg / GW', value: avgPts, note: 'actual points' },
      { label: 'Best GW', value: pts[bestGW], note: `GW ${gws[bestGW]?.gw}` },
      { label: 'Worst GW', value: pts[worstGW], note: `GW ${gws[worstGW]?.gw}`, dim: true },
      { label: 'Transfer Hits', value: totalHits < 0 ? totalHits : 0, note: `${chipCount} chips used`, red: totalHits < 0 },
    ];

    statItems.forEach(item => {
      const card = document.createElement('div');
      card.className = 'overview-stat-card';
      card.innerHTML = `
        <div class="overview-stat-label">${item.label}</div>
        <div class="overview-stat-value" style="${item.red ? 'color:var(--red)' : item.dim ? 'color:var(--amber)' : ''}">${item.value}</div>
        <div class="overview-stat-note">${item.note}</div>
      `;
      statsGrid.appendChild(card);
    });
    page.appendChild(statsGrid);

    // Chart
    const chartOuter = document.createElement('div');
    chartOuter.className = 'chart-outer';
    chartOuter.innerHTML = `
      <div class="chart-title">GW Points &amp; Cumulative Total</div>
      <canvas id="season-chart"></canvas>
    `;
    page.appendChild(chartOuter);

    // Chips timeline
    if (data.chips_used && data.chips_used.length > 0) {
      const timeline = document.createElement('div');
      timeline.className = 'chips-timeline';
      timeline.innerHTML = `<div class="chips-timeline-title">Chips Timeline</div>`;
      const row = document.createElement('div');
      row.className = 'chips-row';
      data.chips_used.forEach(c => {
        const gwIdx  = gws.findIndex(g => g.gw === c.gw);
        const gwPts  = gwIdx >= 0 ? pts[gwIdx] : '?';
        const t      = chipType(c.chip);
        const el     = document.createElement('div');
        el.className = 'chip-event';
        el.innerHTML = `
          <span class="chip-badge chip-${t.toLowerCase()}">${chipLabel(c.chip)}</span>
          <span class="chip-event-gw">GW ${c.gw}</span>
          <span class="chip-event-pts">${gwPts} pts</span>
        `;
        row.appendChild(el);
      });
      timeline.appendChild(row);
      page.appendChild(timeline);
    }

    // Render chart after DOM insertion (needs canvas to exist)
    requestAnimationFrame(() => buildSeasonChart(gws, pts));

    return page;
  }

  function buildSeasonChart(gws, pts) {
    const ctx = document.getElementById('season-chart');
    if (!ctx) return;
    if (seasonChart) { seasonChart.destroy(); seasonChart = null; }

    const labels = gws.map(g => `GW${g.gw}`);
    let cumPts = 0;
    const cumData = pts.map(p => { cumPts += p; return cumPts; });
    const avgLine = gws.map(() => parseFloat((data.total_actual_pts / gws.length).toFixed(1)));

    seasonChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            type: 'bar',
            label: 'GW Points',
            data: pts,
            backgroundColor: pts.map(p =>
              p >= 70 ? 'rgba(0,230,118,0.55)' :
              p <= 45 ? 'rgba(255,23,68,0.45)' :
                        'rgba(100,160,255,0.35)'
            ),
            borderRadius: 3,
            yAxisID: 'y',
          },
          {
            type: 'line',
            label: 'Cumulative',
            data: cumData,
            borderColor: '#00e676',
            borderWidth: 2,
            pointRadius: 0,
            tension: 0.3,
            yAxisID: 'y2',
          },
          {
            type: 'line',
            label: 'GW Average',
            data: avgLine,
            borderColor: 'rgba(255,179,0,0.5)',
            borderWidth: 1.5,
            borderDash: [4, 4],
            pointRadius: 0,
            yAxisID: 'y',
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: {
            labels: {
              color: '#6a88aa', font: { size: 11 },
              boxWidth: 12, padding: 16,
            },
          },
          tooltip: {
            backgroundColor: '#161f30',
            borderColor: '#1e2d45',
            borderWidth: 1,
            titleColor: '#ddeeff',
            bodyColor: '#6a88aa',
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.raw}${ctx.datasetIndex === 1 ? ' total' : ' pts'}`,
            },
          },
        },
        scales: {
          x: {
            ticks: { color: '#3a5070', font: { size: 9 }, maxRotation: 0 },
            grid: { color: 'rgba(30,45,69,0.5)' },
          },
          y: {
            position: 'left',
            title: { display: true, text: 'GW pts', color: '#3a5070', font: { size: 10 } },
            ticks: { color: '#3a5070', font: { size: 10 } },
            grid: { color: 'rgba(30,45,69,0.4)' },
          },
          y2: {
            position: 'right',
            title: { display: true, text: 'Total', color: '#3a5070', font: { size: 10 } },
            ticks: { color: '#3a5070', font: { size: 10 } },
            grid: { display: false },
          },
        },
      },
    });
  }

  // ── BUILD GW PAGE ─────────────────────────────────────────────────────────
  function buildGWPage(gw) {
    const page = document.createElement('div');
    page.className = 'gw-page';

    // GW Header
    const gwHeader = document.createElement('div');
    gwHeader.className = 'gw-header';

    const gwNum = document.createElement('div');
    gwNum.className = 'gw-number';
    gwNum.textContent = `GW ${gw.gw}`;
    gwHeader.appendChild(gwNum);

    if (gw.chip) {
      const chipEl = document.createElement('span');
      chipEl.className = `chip-badge chip-badge-large ${chipClass(gw.chip)}`;
      chipEl.textContent = chipLabel(gw.chip);
      gwHeader.appendChild(chipEl);
    } else {
      gwHeader.appendChild(document.createElement('span'));
    }

    const actualTotal = gw.actual_total ?? gw.actual_pts ?? sumPtsCounted(gw.xi);
    const predTotal   = gw.predicted_total ?? 0;

    const scoreDiv = document.createElement('div');
    scoreDiv.className = 'gw-score';
    const actualEl = document.createElement('span');
    actualEl.className = 'gw-actual ' + (actualTotal >= predTotal ? 'positive' : 'negative');
    actualEl.textContent = actualTotal;
    const predEl = document.createElement('span');
    predEl.className = 'gw-predicted';
    predEl.textContent = `/ ${Math.round(predTotal)}`;
    scoreDiv.appendChild(actualEl);
    scoreDiv.appendChild(predEl);
    gwHeader.appendChild(scoreDiv);
    page.appendChild(gwHeader);

    // GW Meta bar (bank / squad / FT)
    const bank  = gw.bank ?? null;
    const sv    = gw.squad_value ?? null;
    const ft    = gw.free_transfers ?? null;
    if (bank !== null || sv !== null || ft !== null) {
      const meta = document.createElement('div');
      meta.className = 'gw-meta-bar';
      if (bank !== null) {
        meta.innerHTML += `<div class="meta-item"><span class="meta-icon">💰</span><span class="meta-value">£${bank.toFixed(1)}m</span><span style="font-size:10px;color:var(--text-muted);margin-left:2px">bank</span></div>`;
      }
      if (sv !== null) {
        meta.innerHTML += `<div class="meta-item"><span class="meta-icon">📋</span><span class="meta-value">£${sv.toFixed(1)}m</span><span style="font-size:10px;color:var(--text-muted);margin-left:2px">squad</span></div>`;
      }
      if (ft !== null) {
        meta.innerHTML += `<div class="meta-item"><span class="meta-icon">↔</span><span class="meta-value">${ft}</span><span style="font-size:10px;color:var(--text-muted);margin-left:2px">FT</span></div>`;
      }
      page.appendChild(meta);
    }

    // Pitch
    const pitch = document.createElement('div');
    pitch.className = 'pitch-container';
    pitch.innerHTML = `
      <svg class="pitch-lines" viewBox="0 0 780 520" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <line x1="0" y1="260" x2="780" y2="260" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
        <circle cx="390" cy="260" r="58" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
        <circle cx="390" cy="260" r="3" fill="rgba(255,255,255,0.07)"/>
        <rect x="195" y="20" width="390" height="115" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
        <rect x="300" y="20" width="180" height="48" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
        <rect x="195" y="385" width="390" height="115" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
        <rect x="300" y="452" width="180" height="48" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
      </svg>
    `;

    const groups = { GK: [], DEF: [], MID: [], FWD: [] };
    (gw.xi || []).forEach(p => { if (groups[p.pos]) groups[p.pos].push(p); });
    const vc = (gw.xi || []).find(p => p.captain_multiplier === 2 && !p.is_captain) || null;

    ['FWD','MID','DEF','GK'].forEach(pos => {
      const row = document.createElement('div');
      row.className = 'pitch-row';
      groups[pos].forEach(p => row.appendChild(buildPlayerCard(p, vc, gw.gw)));
      pitch.appendChild(row);
    });
    page.appendChild(pitch);

    // Bench
    const benchStrip = document.createElement('div');
    benchStrip.className = 'bench-strip';
    const benchLabel = document.createElement('div');
    benchLabel.className = 'bench-label';
    benchLabel.textContent = 'BENCH';
    benchStrip.appendChild(benchLabel);
    const benchRow = document.createElement('div');
    benchRow.className = 'bench-row';
    const benchSorted = [...(gw.bench || [])].sort((a, b) => {
      if (a.pos === 'GK' && b.pos !== 'GK') return -1;
      if (b.pos === 'GK' && a.pos !== 'GK') return 1;
      if (a.auto_subbed_out && !b.auto_subbed_out) return 1;
      if (b.auto_subbed_out && !a.auto_subbed_out) return -1;
      return (b.predicted_pts || 0) - (a.predicted_pts || 0);
    });
    benchSorted.forEach(p => benchRow.appendChild(buildPlayerCard(p, null, gw.gw)));
    benchStrip.appendChild(benchRow);
    page.appendChild(benchStrip);

    // Captain panel (Claude analysis)
    const gwExpl = explanations[gw.gw];
    if (gwExpl && gwExpl.captain_note) {
      const capPanel = document.createElement('div');
      capPanel.className = 'captain-panel';
      capPanel.innerHTML = `
        <div class="captain-panel-label">Captain Analysis — Claude AI</div>
        <div class="captain-panel-text">${escHtml(gwExpl.captain_note)}</div>
      `;
      page.appendChild(capPanel);
    }

    // Footer (transfers)
    const footer = document.createElement('div');
    footer.className = 'gw-footer';

    const tin  = gw.transfers_in  || [];
    const tout = gw.transfers_out || [];

    if (tin.length === 0 && tout.length === 0) {
      const noT = document.createElement('span');
      noT.style.color = 'var(--text-muted)';
      noT.textContent = gw.gw === 1 ? 'Fresh squad (GW1)' : 'No transfers';
      footer.appendChild(noT);
    } else {
      if (tin.length > 0) {
        const sec = document.createElement('div');
        sec.className = 'footer-section';
        tin.forEach(name => {
          const s = document.createElement('span');
          s.innerHTML = `<span class="transfer-in">&#8593;</span> ${escHtml(name)}`;
          sec.appendChild(s);
        });
        footer.appendChild(sec);
      }
      if (tout.length > 0) {
        const sec = document.createElement('div');
        sec.className = 'footer-section';
        tout.forEach(name => {
          const s = document.createElement('span');
          s.innerHTML = `<span class="transfer-out">&#8595;</span> ${escHtml(name)}`;
          sec.appendChild(s);
        });
        footer.appendChild(sec);
      }
    }

    if (gw.penalty_pts < 0) {
      const hitEl = document.createElement('span');
      hitEl.className = 'hit-line';
      hitEl.textContent = `HIT: ${gw.penalty_pts} pts`;
      footer.appendChild(hitEl);
    }

    page.appendChild(footer);
    return page;
  }

  // ── BUILD PLAYER CARD ─────────────────────────────────────────────────────
  function buildPlayerCard(p, vc, gwNum) {
    const card = document.createElement('div');
    card.className = 'player-card';

    const actual = p.actual_pts ?? 0;
    const pred   = p.predicted_pts ?? 0;

    if (p.auto_subbed_out) {
      card.classList.add('subbed-out');
    } else if (actual > pred + 1) {
      card.classList.add('border-green');
    } else if (actual < pred - 1) {
      card.classList.add('border-red');
    } else {
      card.classList.add('border-amber');
    }

    // Position badge
    const posBadge = document.createElement('div');
    posBadge.className = `pos-badge pos-${(p.pos||'').toLowerCase()}`;
    posBadge.textContent = p.pos || '?';
    card.appendChild(posBadge);

    // Sub-out badge
    if (p.auto_subbed_out) {
      const badge = document.createElement('div');
      badge.className = 'sub-out-badge';
      badge.textContent = '↓';
      card.appendChild(badge);
    }

    // Captain / VC badge
    if (p.is_captain) {
      const badge = document.createElement('div');
      badge.className = 'cap-badge';
      badge.textContent = p.captain_multiplier === 3 ? 'TC' : 'C';
      card.appendChild(badge);
    } else if (vc && p.player_id === vc.player_id) {
      const badge = document.createElement('div');
      badge.className = 'cap-badge vc';
      badge.textContent = 'V';
      card.appendChild(badge);
    }

    // Name
    const nameEl = document.createElement('div');
    nameEl.className = 'player-name';
    nameEl.textContent = p.web_name;
    card.appendChild(nameEl);

    // Points
    const ptsEl = document.createElement('div');
    ptsEl.className = 'player-pts';
    ptsEl.textContent = p.pts_counted ?? actual;
    card.appendChild(ptsEl);

    if (p.is_captain && p.captain_multiplier > 1) {
      const multEl = document.createElement('div');
      multEl.className = 'player-pts-sub';
      multEl.textContent = `×${p.captain_multiplier}`;
      card.appendChild(multEl);
    }

    // Price + predicted
    const metaEl = document.createElement('div');
    metaEl.className = 'player-meta';
    if (p.price) {
      const priceEl = document.createElement('span');
      priceEl.className = 'player-price';
      priceEl.textContent = `£${p.price.toFixed(1)}m`;
      metaEl.appendChild(priceEl);
    }
    if (pred > 0) {
      const predEl = document.createElement('span');
      predEl.className = 'player-predicted';
      predEl.textContent = `~${pred.toFixed(1)}`;
      metaEl.appendChild(predEl);
    }
    card.appendChild(metaEl);

    // Intel flags
    const gw_intel = intelData[String(gwNum)];
    const p_intel  = gw_intel ? gw_intel[String(p.player_id)] : null;
    if (p_intel) {
      const avail = p_intel.avail_pct ?? 100;
      const rot   = p_intel.rotation_risk ?? 0;
      if (avail < 85 || rot > 60) {
        const flagsEl = document.createElement('div');
        flagsEl.className = 'intel-flags';
        if (avail < 85) {
          const icon = document.createElement('span');
          icon.className = 'intel-icon avail-warn';
          icon.title = `${avail}% availability`;
          icon.textContent = `${avail}%`;
          flagsEl.appendChild(icon);
        }
        if (rot > 60) {
          const icon = document.createElement('span');
          icon.className = 'intel-icon rot-warn';
          icon.title = `${Math.round(rot)}% rotation risk`;
          icon.textContent = `R${Math.round(rot)}`;
          flagsEl.appendChild(icon);
        }
        card.appendChild(flagsEl);
      }
    }

    // Claude explanation bubble
    const gwExpl   = gwNum && explanations[gwNum];
    const sentence = gwExpl && gwExpl.players[p.web_name];
    if (sentence) {
      const bubble = document.createElement('div');
      bubble.className = 'claude-bubble';
      bubble.textContent = 'AI';
      bubble.addEventListener('click', e => {
        e.stopPropagation();
        showTooltip(bubble, sentence);
      });
      card.appendChild(bubble);
    }

    return card;
  }

  // ── TOOLTIP ──────────────────────────────────────────────────────────────
  function showTooltip(anchor, text) {
    const tooltip = document.getElementById('claude-tooltip');
    document.getElementById('claude-tooltip-text').textContent = text;

    const rect = anchor.getBoundingClientRect();
    const tw   = 420;
    const gap  = 10;

    tooltip.style.left = '-9999px';
    tooltip.style.top  = '-9999px';
    tooltip.classList.add('visible');

    const th   = tooltip.offsetHeight;
    let left   = rect.left + rect.width / 2 - tw / 2;
    left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
    const topAbove = rect.top - th - gap;
    tooltip.style.left = `${left}px`;
    tooltip.style.top  = topAbove < 70 ? `${rect.bottom + gap}px` : `${topAbove}px`;
  }

  function hideTooltip() {
    document.getElementById('claude-tooltip').classList.remove('visible');
  }

  // ── HELPERS ──────────────────────────────────────────────────────────────
  function sumPtsCounted(xi) {
    return (xi || []).reduce((s, p) => s + (p.pts_counted || 0), 0);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── NAVIGATION ───────────────────────────────────────────────────────────
  function goToGW(index, animate = true) {
    if (!data || allPages.length === 0) return;
    index = Math.max(0, Math.min(allPages.length - 1, index));
    currentGW = index;

    const track = document.getElementById('carousel-track');
    if (!animate) {
      track.classList.add('no-transition');
      track.style.transform = `translateX(-${index * 100}%)`;
      track.getBoundingClientRect();
      track.classList.remove('no-transition');
    } else {
      track.style.transform = `translateX(-${index * 100}%)`;
    }

    const label = allPages[index];
    document.getElementById('gw-indicator').textContent =
      label === 'overview'
        ? `Overview — 1/${allPages.length}`
        : `GW ${label} — ${index}/${allPages.length - 1}`;

    document.querySelectorAll('.gw-dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === index);
    });

    updateNav();

    // Rebuild chart if returning to overview (canvas may need re-init)
    if (label === 'overview' && data) {
      const pts = data.gameweeks.map(g => g.actual_total ?? g.actual_pts ?? sumPtsCounted(g.xi));
      buildSeasonChart(data.gameweeks, pts);
    }
  }

  function updateNav() {
    const total = allPages.length;
    document.getElementById('nav-prev').disabled = currentGW <= 0;
    document.getElementById('nav-next').disabled = currentGW >= total - 1;
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  goToGW(currentGW - 1);
    if (e.key === 'ArrowRight') goToGW(currentGW + 1);
    if (e.key === 'Home') goToGW(0);
  });

  // ── RUN SIMULATION ────────────────────────────────────────────────────────
  async function runSimulation() {
    if (isRunning) return;
    isRunning = true;
    const btn = document.getElementById('run-btn');
    btn.classList.add('running');
    btn.textContent = 'SIMULATING…';
    await fetch('/api/run', { method: 'POST' });
    pollInterval = setInterval(checkStatus, 3000);
  }

  async function checkStatus() {
    const res  = await fetch('/api/status');
    const json = await res.json();
    if (!json.running && isRunning) {
      clearInterval(pollInterval);
      pollInterval = null;
      isRunning = false;
      const btn = document.getElementById('run-btn');
      btn.classList.remove('running');
      btn.textContent = 'RUN SIMULATION';
      const dataRes = await fetch('/api/data');
      if (dataRes.ok) {
        const newData = await dataRes.json();
        if (!newData.error) {
          data = newData;
          renderHeader();
          renderCarousel();
        }
      }
    }
  }
</script>
</body>
